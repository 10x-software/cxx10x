name: Pre-publish tests
description: Run py10x-core's suite against the workflow-package with coordinated core from PyPI
inputs:
  pyproject-path:
    description: Path to the workflow-package pyproject.toml whose test group pins py10x-core
    required: true
runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      shell: bash
      run: uv python install 3.12

    - name: Start MongoDB (single-node replica set)
      uses: supercharge/mongodb-github-action@1.12.1
      with:
        mongodb-version: "7.0"
        mongodb-replica-set: rs0
        mongodb-port: 27017

    - name: Install from PyPI + local workflow checkout, then test
      shell: bash
      env:
        WORKFLOW_PYPROJECT: ${{ inputs.pyproject-path }}
        CXX_ROOT: ${{ github.workspace }}
        RUN_DIR: ${{ runner.temp }}/pre-publish
        PYPI_TIMEOUT_SEC: "900"
        PYPI_POLL_SEC: "90"
      run: |
        set -euo pipefail
        bash "${{ github.workspace }}/.github/scripts/pre-publish-install.sh"
        cd "$RUN_DIR"
        source .venv/bin/activate
        source pre-publish.env

        playwright install --with-deps chromium

        python3 -c "
        import json
        from importlib.metadata import distribution, version
        assert version('py10x-core') == '${CORE_VER}'
        raw = distribution('${WORKFLOW_PKG}').read_text('direct_url.json') or '{}'
        assert json.loads(raw).get('dir_info', {}).get('editable'), '${WORKFLOW_PKG} not editable'
        print('py10x-core==', version('py10x-core'), 'workflow-package editable OK')
        "

        TEST_ROOTS=$(python3 -c "
        import core_10x, dev_10x, infra_10x, ui_10x, xx_common
        from pathlib import Path
        print(' '.join(str(Path(m.__file__).resolve().parent) for m in (
            core_10x, infra_10x, ui_10x, xx_common, dev_10x)))
        ")
        PYTHONUNBUFFERED=1 pytest $TEST_ROOTS
