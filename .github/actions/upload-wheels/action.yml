name: Upload wheels to PyPI
description: Download wheel artifacts, flatten them, and publish to PyPI
runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v7
      with:
        path: dist

    - name: Flatten wheels
      shell: bash
      run: |
        mkdir -p upload
        find dist -name "*.whl" -exec cp {} upload/ \;

    - name: Upload wheels to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: upload
