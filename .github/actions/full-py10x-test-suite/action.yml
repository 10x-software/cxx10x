name: Full py10x test suite
description: Install py10x-core from sibling py10x, verify constraints, MongoDB, Playwright, and run pytest
inputs:
  python-version:
    description: Python version to install via uv
    required: true
    default: "3.12"
  mongodb-version:
    description: MongoDB major.minor for Linux (Docker) and Windows (preinstalled Server path)
    required: true
    default: "7.0"
  py10x-branch:
    description: Branch checked out on the sibling py10x clone
    required: true
    default: "main"
  wait-for-coordinated-main:
    description: Poll until py10x main pins match sibling checkouts (main-push race)
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Setup Windows build
      if: runner.os == 'Windows'
      uses: ./.github/actions/setup-windows-build

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.workspace }}/../py10x
      env:
        WAIT_FOR_SIBLING_BRANCH: ${{ inputs.wait-for-coordinated-main == 'true' && inputs.py10x-branch || '' }}
        WAIT_FOR_SIBLING_BRANCH_SYNC_BASE: ${{ inputs.wait-for-coordinated-main == 'true' && '1' || '' }}
      run: |
        uv venv
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        python -m dev_10x.uv_sync py10x-core-dev --all-extras

    # uv-sync applies -c constraints.txt on every install, so the test env is frozen. Assert every
    # installed third-party dist is pinned (catches a py10x or sibling dep that escaped the freeze).
    - name: Verify env is fully frozen against constraints.txt
      shell: bash
      working-directory: ${{ github.workspace }}/../py10x
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        xx-constraints check

    - name: Setup Mongo replica set
      uses: ./.github/actions/setup-mongo-replica-set
      with:
        mongodb-version: ${{ inputs.mongodb-version }}

    - name: Install Playwright chromium
      shell: bash
      working-directory: ${{ github.workspace }}/../py10x
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        playwright install --with-deps chromium

    - name: Run full test suite
      shell: bash
      working-directory: ${{ github.workspace }}/../py10x
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
        pytest
