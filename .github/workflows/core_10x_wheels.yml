name: wheels-core_10x

on:
  push:
    tags:
      - "py10x-kernel-v*"
  workflow_dispatch:

jobs:
  test_with_released_py10x:
    name: Test against released py10x
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout cxx10x
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: Install released py10x + local kernel package
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${{ github.workspace }}/core_10x[test-py10x]"

      - name: Setup Mongo replica set
        uses: 10x-software/py10x/.github/actions/setup-mongo-replica-set@main

      - name: Run released py10x compatibility smoke test
        working-directory: /tmp
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python - <<'PY'
          import importlib.metadata as md
          import py10x_kernel
          from core_10x.exec_control import CACHE_ONLY, GRAPH_ON
          from core_10x.traitable import T, RT, Traitable

          assert md.version("py10x-core") == "0.1.14"

          class Smoke(Traitable):
              key: int = RT(T.ID)
              value: int = RT()

              def value_get(self) -> int:
                  return self.key + 1

          with CACHE_ONLY(), GRAPH_ON():
              x = Smoke(key=1)
              assert x.value == 2

          print("Kernel release compatibility smoke test passed")
          print(py10x_kernel.__file__)
          PY

  build_wheels:
    needs: test_with_released_py10x
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        with:
          package-dir: core_10x
          output-dir: core_10x/wheelhouse
        env:
          CIBW_BUILD: "cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ENVIRONMENT_MACOS: 'MACOSX_DEPLOYMENT_TARGET=13.3'
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_34"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-core_10x-${{ matrix.os }}
          path: core_10x/wheelhouse/*.whl

  upload:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Flatten wheels
        run: |
          mkdir -p upload
          find dist -name "*.whl" -exec cp {} upload/ \;

      - name: Upload wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
