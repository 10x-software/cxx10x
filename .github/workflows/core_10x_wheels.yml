name: wheels-core_10x

on:
  push:
    tags:
      - "py10x-kernel-v*"
      - "!*_yanked"   # `xx-promote yank` renames a tag to <tag>_yanked; never (re)publish those
  workflow_dispatch:

jobs:
  test:
    name: Pre-publish tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history + all tags so setuptools-scm versions BOTH siblings

      - uses: ./.github/actions/pre-publish-tests
        with:
          pyproject-path: core_10x/pyproject.toml

  build_wheels:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/build-wheels
        with:
          package-dir: core_10x
          artifact-name: wheels-core_10x-${{ matrix.os }}

  upload:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Flatten wheels
        run: |
          mkdir -p upload
          find dist -name "*.whl" -exec cp {} upload/ \;

      - name: Upload wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
