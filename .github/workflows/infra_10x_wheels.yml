name: wheels-infra_10x

on:
  push:
    tags:
      - "py10x-infra-v*"
  workflow_dispatch:

jobs:
  test_with_released_py10x:
    name: Test against released py10x
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout cxx10x
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: Install released py10x + local infra package
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${{ github.workspace }}/infra_10x[test-py10x]"

      - name: Setup Mongo replica set
        uses: 10x-software/py10x/.github/actions/setup-mongo-replica-set@main

      - name: Run released py10x full unit test suite
        working-directory: /tmp
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python - <<'PY'
          import pathlib
          import subprocess
          import sys

          import core_10x

          py10x_root = pathlib.Path(core_10x.__file__).resolve().parent.parent
          targets = [
              py10x_root / "core_10x" / "unit_tests",
              py10x_root / "infra_10x" / "unit_tests",
              py10x_root / "ui_10x" / "rio" / "unit_tests",
              py10x_root / "ui_10x" / "rio" / "widgets" / "unit_tests",
              py10x_root / "ui_10x" / "unit_tests",
          ]
          cmd = [sys.executable, "-m", "pytest", *map(str, targets)]
          raise SystemExit(subprocess.call(cmd))
          PY

  build_wheels:
    needs: test_with_released_py10x
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        with:
          package-dir: infra_10x
          output-dir: infra_10x/wheelhouse
        env:
          CIBW_BUILD: "cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ENVIRONMENT_MACOS: 'MACOSX_DEPLOYMENT_TARGET=13.3'
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"


      - uses: actions/upload-artifact@v4
        with:
          name: wheels-infra_10x-${{ matrix.os }}
          path: infra_10x/wheelhouse/*.whl
  upload:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten wheels
        run: |
          mkdir -p upload
          find dist -name "*.whl" -exec cp {} upload/ \;

      - name: Upload wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
