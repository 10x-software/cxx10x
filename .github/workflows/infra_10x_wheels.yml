name: wheels-infra_10x

on:
  push:
    tags:
      - "py10x-infra-v*"
      - "!*_yanked"   # `xx-promote yank` renames a tag to <tag>_yanked; never (re)publish those
  workflow_dispatch:

jobs:
  # Pre-publish gate: run py10x-core's suite against THIS checkout's kernel/infra (the rc/final
  # commit under test), with py10x-core pinned to the exact version in the reverse `test` group.
  test:
    name: Pre-publish tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + all tags so setuptools-scm versions BOTH siblings
                           # (kernel's tag is on an ancestor; a shallow clone yields 0.1.dev1)

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Start MongoDB (single-node replica set)
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: "7.0"
          mongodb-replica-set: rs0
          mongodb-port: 27017

      # The reverse [dependency-groups] test pin names the exact py10x-core to test against.
      - name: Resolve pinned py10x-core version
        id: core
        run: |
          CORE_VER=$(python3 -c "import re; print(re.search(r'py10x-core==([\w.]+)', open('infra_10x/pyproject.toml').read()).group(1))")
          echo "version=$CORE_VER" >> "$GITHUB_OUTPUT"

      # py10x as a sibling of this checkout, so `../cxx10x` from py10x points back here.
      - name: Checkout py10x at the pinned version
        run: |
          git clone https://github.com/10x-software/py10x.git "${{ github.workspace }}/../py10x"
          git -C "${{ github.workspace }}/../py10x" checkout "v${{ steps.core.outputs.version }}"

      # Plain venv, no source override - so py10x-core's tree stays clean and setuptools-scm reports
      # the real tag version (no dirty guess-next-dev). Build this checkout's kernel/infra editable
      # FIRST, then install py10x-core - whose pinned version admits them, so they are kept as-is
      # (no rebuild, no index pull). kernel/infra are tagged together at this commit, so each
      # editable install picks up its own correct tagged version.
      - name: Install local kernel/infra, then py10x-core
        working-directory: ${{ github.workspace }}/../py10x
        run: |
          uv venv
          uv pip install -e ../cxx10x/core_10x -e ../cxx10x/infra_10x
          uv pip install -e . --all-extras --requirements pyproject.toml

      - name: Install Playwright chromium
        working-directory: ${{ github.workspace }}/../py10x
        run: uv run --no-sync playwright install --with-deps chromium

      - name: Verify versions + run py10x-core suite
        working-directory: ${{ github.workspace }}/../py10x
        env:
          PYTHONUNBUFFERED: "1"
          CORE_VER: ${{ steps.core.outputs.version }}
        run: |
          uv run --no-sync python - <<'PY'
          import json, os
          from importlib.metadata import version, distribution
          from packaging.version import Version
          core = Version(version("py10x-core"))
          assert core == Version(os.environ["CORE_VER"]), f"py10x-core {core} != pinned {os.environ['CORE_VER']}"
          def editable(name):  # PEP 610: editable installs record dir_info.editable
              raw = distribution(name).read_text("direct_url.json") or "{}"
              return json.loads(raw).get("dir_info", {}).get("editable", False)
          for s in ("py10x-kernel", "py10x-infra"):
              assert editable(s), f"{s} not editable from local checkout - py10x-core's pin pulled an index build"
          print(f"py10x-core {core}; kernel {version('py10x-kernel')}; infra {version('py10x-infra')} OK")
          PY
          uv run --no-sync pytest

  build_wheels:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        with:
          package-dir: infra_10x
          output-dir: infra_10x/wheelhouse
        env:
          CIBW_BUILD: "cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ENVIRONMENT_MACOS: 'MACOSX_DEPLOYMENT_TARGET=13.3'
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"


      - uses: actions/upload-artifact@v7
        with:
          name: wheels-infra_10x-${{ matrix.os }}
          path: infra_10x/wheelhouse/*.whl
  upload:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Flatten wheels
        run: |
          mkdir -p upload
          find dist -name "*.whl" -exec cp {} upload/ \;

      - name: Upload wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
