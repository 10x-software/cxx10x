name: wheels-infra_10x

on:
  push:
    tags:
      - "py10x-infra-v*"
  workflow_dispatch:

jobs:
  test_with_released_py10x:
    name: Test against released py10x
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout cxx10x
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: Checkout latest released py10x
        run: |
          git clone https://github.com/10x-software/py10x.git ../py10x
          latest_tag="$(git -C ../py10x tag -l "v*" --sort=-v:refname | sed -n '1p')"
          if [ -z "${latest_tag}" ]; then
            echo "Could not find a py10x release tag matching v*"
            exit 1
          fi
          git -C ../py10x checkout "${latest_tag}"
          echo "Testing against py10x release ${latest_tag}"

      - name: Install dependencies with local cxx10x sources
        working-directory: ../py10x
        run: uvx --from ".[dev]" uv-sync py10x-core-dev --all-extras

      - name: Start Mongo replica-set server
        run: |
          docker run -d --name mongo-rs \
            -p 27017:27017 \
            mongo:8 \
            --replSet rs0 --bind_ip_all

      - name: Initialize Mongo replica set
        run: |
          for i in {1..30}; do
            if docker exec mongo-rs mongosh --quiet --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          docker exec mongo-rs mongosh --quiet --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) || true"

          for i in {1..60}; do
            if docker exec mongo-rs mongosh --quiet --eval "db.hello().isWritablePrimary" | awk '/true/{found=1} END{exit(found?0:1)}'; then
              echo "Mongo replica set is PRIMARY"
              break
            fi
            sleep 1
          done

          docker exec mongo-rs mongosh --quiet --eval "db.hello().isWritablePrimary" | awk '/true/{found=1} END{exit(found?0:1)}'

      - name: Run py10x unit tests
        env:
          PYTHONUNBUFFERED: "1"
        working-directory: ../py10x
        run: |
          source .venv/bin/activate
          pytest

  build_wheels:
    needs: test_with_released_py10x
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        with:
          package-dir: infra_10x
          output-dir: infra_10x/wheelhouse
        env:
          CIBW_BUILD: "cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ENVIRONMENT_MACOS: 'MACOSX_DEPLOYMENT_TARGET=13.3'
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"


      - uses: actions/upload-artifact@v4
        with:
          name: wheels-infra_10x-${{ matrix.os }}
          path: infra_10x/wheelhouse/*.whl
  upload:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten wheels
        run: |
          mkdir -p upload
          find dist -name "*.whl" -exec cp {} upload/ \;

      - name: Upload wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
